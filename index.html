<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic Tac Toe</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #6a11cb 0%, #fc5c7d 100%);
      font-family: 'Segoe UI', sans-serif;
    }

    h1 {
      color: #fff;
      font-size: 2.5rem;
      margin-bottom: 1rem;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
      letter-spacing: 2px;
    }

    #status {
      color: #fff;
      font-size: 1.3rem;
      margin-bottom: 1.2rem;
      min-height: 1.8rem;
      font-weight: 600;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.2);
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 12px;
    }

    .cell {
      background: rgba(255, 255, 255, 0.2);
      border: none;
      border-radius: 18px;
      font-size: 3rem;
      font-weight: 900;
      cursor: pointer;
      transition: transform 0.15s, background 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
      backdrop-filter: blur(4px);
      color: transparent;
    }

    .cell:hover:not([data-mark]) {
      background: rgba(255, 255, 255, 0.35);
      transform: scale(1.05);
    }

    .cell[data-mark="X"] {
      color: #4fc3f7;
      text-shadow: 0 0 12px #4fc3f7;
      animation: pop 0.2s ease;
    }

    .cell[data-mark="O"] {
      color: #ffb347;
      text-shadow: 0 0 12px #ffb347;
      animation: pop 0.2s ease;
    }

    .cell.winner {
      background: rgba(255, 255, 255, 0.55);
      box-shadow: 0 0 24px 6px rgba(255, 255, 255, 0.7);
      transform: scale(1.08);
    }

    @keyframes pop {
      0%   { transform: scale(0.7); }
      60%  { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    #restart {
      margin-top: 1.6rem;
      padding: 0.7rem 2.2rem;
      font-size: 1.1rem;
      font-weight: 700;
      border: none;
      border-radius: 50px;
      background: #fff;
      color: #6a11cb;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      transition: transform 0.15s, box-shadow 0.15s;
      letter-spacing: 1px;
    }

    #restart:hover {
      transform: scale(1.06);
      box-shadow: 0 6px 20px rgba(0,0,0,0.25);
    }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <div id="status">X's turn</div>
  <div id="board">
    <button class="cell" onclick="handleClick(0)"></button>
    <button class="cell" onclick="handleClick(1)"></button>
    <button class="cell" onclick="handleClick(2)"></button>
    <button class="cell" onclick="handleClick(3)"></button>
    <button class="cell" onclick="handleClick(4)"></button>
    <button class="cell" onclick="handleClick(5)"></button>
    <button class="cell" onclick="handleClick(6)"></button>
    <button class="cell" onclick="handleClick(7)"></button>
    <button class="cell" onclick="handleClick(8)"></button>
  </div>
  <button id="restart" onclick="resetGame()">Restart</button>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board = Array(9).fill(null);
    let currentPlayer = 'X';
    let gameOver = false;

    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');

    function handleClick(index) {
      if (gameOver || board[index]) return;

      board[index] = currentPlayer;
      const cell = cells[index];
      cell.textContent = currentPlayer;
      cell.setAttribute('data-mark', currentPlayer);

      const winLine = checkWinner();
      if (winLine) {
        winLine.forEach(i => cells[i].classList.add('winner'));
        status.textContent = `${currentPlayer} wins! 🎉`;
        gameOver = true;
        return;
      }

      if (board.every(Boolean)) {
        status.textContent = "It's a draw! 🤝";
        gameOver = true;
        return;
      }

      currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
      status.textContent = `${currentPlayer}'s turn`;
    }

    function checkWinner() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return [a, b, c];
        }
      }
      return null;
    }

    function resetGame() {
      board = Array(9).fill(null);
      currentPlayer = 'X';
      gameOver = false;
      cells.forEach(cell => {
        cell.textContent = '';
        cell.removeAttribute('data-mark');
        cell.classList.remove('winner');
      });
      status.textContent = "X's turn";
    }
  </script>
</body>
</html>
